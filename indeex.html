<!DOCTYPE html>
<html>
<head>
<title>WebMaker.Com</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e1e,#3a3a3a);
  color:white;
  text-align:center;
}

h1{margin-top:20px;}

input, select{
  padding:10px;
  margin:5px;
  width:80%;
  border-radius:5px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  width:85%;
  border:none;
  border-radius:5px;
  background:orange;
  color:white;
}

.preview{
  background:white;
  color:black;
  margin:20px;
  padding:15px;
  border-radius:10px;
}

.product{
  border-bottom:1px solid #ccc;
  margin-bottom:10px;
  padding:10px;
}

img{
  width:100px;
}
</style>
</head>

<body>

<h1>WebMaker.Com</h1>

<input id="siteName" placeholder="Website Name"><br>
<input id="pname" placeholder="Product Name"><br>
<input id="price" placeholder="Price"><br>
<input id="img" placeholder="Image URL"><br>

<select id="font">
<option value="Arial">Default</option>
<option value="cursive">Cursive</option>
<option value="monospace">Mono</option>
</select>

<button onclick="addProduct()">Add Product</button>
<button onclick="generateSite()">Create Website</button>

<div class="preview" id="output"></div>

<script>

let products = [];
let cart = [];

function addProduct(){
  let name = document.getElementById("pname").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  products.push({name,price,img});
  alert("Product Added");
}

function generateSite(){
  let site = document.getElementById("siteName").value;
  let font = document.getElementById("font").value;

  let html = `<h2>${site}</h2>`;

  products.forEach((p,i)=>{
    html += `
    <div class="product">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>`;
  });

  html += `<button onclick="checkout()">Checkout</button>`;

  document.getElementById("output").style.fontFamily = font;
  document.getElementById("output").innerHTML = html;
}

function addToCart(i){
  cart.push(products[i]);
  alert("Added to cart");
}

function checkout(){
  let total = 0;
  let msg = "Order:%0A";

  cart.forEach(p=>{
    total += Number(p.price);
    msg += p.name + " - ₹" + p.price + "%0A";
  });

  msg += "Total: ₹" + total;

  window.open("https://wa.me/919455104193?text=" + msg);

  let upi = "9455104193@axl";
  window.location.href = `upi://pay?pa=${upi}&pn=WebMaker&am=${total}&cu=INR`;
}

</script>

</body>
</html>
