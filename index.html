<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KC Stickers Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

.card {
  background: white;
  width: 220px;
  margin: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  border: none;
  padding: 10px;
  margin-top: 8px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}

.buy {
  background: green;
  color: white;
}

.pay {
  background: orange;
  color: white;
}
</style>

<script>
function orderNow(product, price) {
  let name = prompt("Apna naam likho:");
  let address = prompt("Apna address likho:");

  if(name && address){
    let msg = `Order:%0AProduct: ${product}%0APrice: ₹${price}%0AName: ${name}%0AAddress: ${address}`;
    window.open(`https://wa.me/919455104193?text=${msg}`, "_blank");
  } else {
    alert("Details fill karo");
  }
}

function payNow(price) {
  let upi = "9455104193@axl"; // ✅ Teri UPI ID added
  let link = `upi://pay?pa=${upi}&pn=KC Stickers&am=${price}&cu=INR`;
  window.location.href = link;
}
</script>

</head>

<body>

<header>KC Stickers Shop</header>

<div class="container">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Anime Sticker</h3>
    <p>₹50</p>
    <button class="buy" onclick="orderNow('Anime Sticker',50)">Order on WhatsApp</button>
    <button class="pay" onclick="payNow(50)">Pay Now</button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Cool Sticker</h3>
    <p>₹70</p>
    <button class="buy" onclick="orderNow('Cool Sticker',70)">Order on WhatsApp</button>
    <button class="pay" onclick="payNow(70)">Pay Now</button>
  </div>

</div>

</body>
</html>
